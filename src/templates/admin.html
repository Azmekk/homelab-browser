{{define "head"}}
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js" defer></script>
<script src="/admin.js" defer></script>
{{end}}

{{define "body"}}
<header class="topbar">
    <div class="topbar-inner topbar-admin">
        <a class="brand" href="/">{{.PageTitle}}</a>
        <div class="topbar-admin-right">
            <span class="user-chip">{{.Username}}</span>
            <form method="POST" action="/logout"><button class="btn btn-ghost" type="submit">Logout</button></form>
        </div>
    </div>
</header>

<main class="admin">
    <section class="admin-section">
        <header class="admin-section-head">
            <h2>Dashboard title</h2>
        </header>
        <form id="title-form" class="inline-form">
            <input id="title-input" type="text" required maxlength="120">
            <button id="title-save-btn" class="btn btn-primary" type="submit">Save</button>
            <span id="title-saved" class="hint">Saved</span>
        </form>
    </section>

    <section class="admin-section">
        <header class="admin-section-head">
            <h2>Services</h2>
            <button id="add-svc-btn" class="btn btn-primary" type="button">+ Add service</button>
        </header>

        <p id="empty-hint" class="empty-hint" hidden>No services yet. Add your first one above.</p>

        <ul id="svc-list" class="svc-list"></ul>

        <template id="svc-row-tpl">
            <li class="svc-row">
                <button class="drag-handle" type="button" aria-label="Drag to reorder" title="Drag to reorder">⠿</button>
                <div class="svc-icon">
                    <img class="svc-icon-img" alt="" hidden>
                    <div class="svc-icon-placeholder" hidden></div>
                </div>
                <div class="svc-meta">
                    <div class="svc-title"></div>
                    <div class="svc-url"></div>
                </div>
                <label class="svc-newtab">
                    <input class="svc-newtab-input" type="checkbox">
                    <span>New tab</span>
                </label>
                <div class="svc-actions">
                    <button class="btn btn-tiny btn-up" type="button" aria-label="Move up">▲</button>
                    <button class="btn btn-tiny btn-down" type="button" aria-label="Move down">▼</button>
                    <button class="btn btn-tiny btn-edit" type="button" aria-label="Edit">Edit</button>
                    <button class="btn btn-tiny btn-danger btn-delete" type="button" aria-label="Delete">Delete</button>
                </div>
            </li>
        </template>
    </section>

    <div id="modal-scrim" class="modal-scrim" hidden>
        <div class="modal">
            <header class="modal-head">
                <h3 id="modal-title">Add service</h3>
                <button id="modal-close-btn" class="btn btn-ghost" type="button">✕</button>
            </header>
            <form id="svc-form" class="modal-body">
                <label>
                    <span>Title</span>
                    <input id="svc-title-input" type="text" required maxlength="120">
                </label>
                <label>
                    <span>URL</span>
                    <input id="svc-url-input" type="url" required placeholder="https://…">
                </label>
                <label class="checkbox-row">
                    <input id="svc-newtab-input" type="checkbox">
                    <span>Open in new tab</span>
                </label>
                <label class="file-row">
                    <span>Icon (optional, max 2MB)</span>
                    <input id="svc-icon-file" type="file" accept="image/*">
                    <div id="svc-current-icon" class="current-icon" hidden>Current: <img id="svc-current-icon-img" alt=""></div>
                </label>
                <div id="modal-error" class="form-error" hidden></div>
                <div class="modal-foot">
                    <button id="modal-cancel-btn" class="btn btn-ghost" type="button">Cancel</button>
                    <button id="modal-save-btn" class="btn btn-primary" type="submit">Save</button>
                </div>
            </form>
        </div>
    </div>
</main>
{{end}}
